  ruby-build-amd64:
    executor: docker
    working_directory: ~/docker
    steps:
      - checkout
      - sync-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run: make -C ruby platform=amd64 test-platform-docker
    resource_class: large
  ruby-push-amd64:
    executor: docker
    steps:
