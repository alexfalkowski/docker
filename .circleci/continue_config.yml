      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make -C k8s platform=amd64 release-platform-docker
    resource_class: large
  k8s-build-arm64:
    executor: docker
    working_directory: ~/docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run: make -C k8s platform=arm64 test-platform-docker
    resource_class: arm.large
  k8s-push-arm64:
    executor: docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make -C k8s platform=arm64 release-platform-docker
    resource_class: arm.large
  k8s-manifest:
    executor: docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make -C k8s manifest-platform-docker
    resource_class: arm.large

  release-build-amd64:
    executor: docker
    working_directory: ~/docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run: make -C release platform=amd64 test-platform-docker
    resource_class: large
  release-push-amd64:
    executor: docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make -C release platform=amd64 release-platform-docker
    resource_class: large
  release-build-arm64:
    executor: docker
    working_directory: ~/docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run: make -C release platform=arm64 test-platform-docker
    resource_class: arm.large
  release-push-arm64:
    executor: docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make -C release platform=arm64 release-platform-docker
    resource_class: arm.large
  release-manifest:
    executor: docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make -C release manifest-platform-docker
