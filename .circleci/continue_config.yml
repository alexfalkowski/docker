  root-build-arm64:
    executor: docker
    working_directory: ~/docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run: make -C root platform=arm64 test-platform-docker
    resource_class: arm.large
  root-push-arm64:
    executor: docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make -C root platform=arm64 release-platform-docker
    resource_class: arm.large
  root-manifest:
    executor: docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make -C root manifest-platform-docker
