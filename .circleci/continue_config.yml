version: 2.1

parameters:
  docker:
    type: boolean
    default: false
  stack:
    type: boolean
    default: false
  go:
    type: boolean
    default: false
  k8s:
    type: boolean
    default: false
  release:
    type: boolean
    default: false
  root:
    type: boolean
    default: false
  ruby:
    type: boolean
    default: false

commands:
  sync-submodules:
    steps:
      - run: git submodule sync
      - run: git submodule update --init
  checkout-submodules:
    steps:
      - checkout:
          method: blobless
      - sync-submodules

executors:
  docker:
    docker:
      - image: alexfalkowski/docker:3.17
  release:
    docker:
      - image: alexfalkowski/release:8.19
  alpine:
    docker:
      - image: alpine:latest

jobs:
  lint:
    executor: docker
    steps:
      - checkout-submodules
      - run: make lint
      - run: make trivy-repo
    resource_class: arm.large
  stack-config:
    executor: docker
    working_directory: ~/docker
    steps:
      - checkout-submodules
      - run: make stack-config
    resource_class: arm.large
  sync:
    executor: release
    working_directory: ~/docker
    steps:
      - checkout-submodules
      - run: make sync push
    resource_class: arm.large
  version:
    executor: release
    working_directory: ~/docker
    steps:
      - checkout-submodules
      - run: version
      - run: package
    resource_class: arm.large
  wait-all:
    executor: alpine
    resource_class: small
    steps:
      - run: echo "all applicable jobs finished"

  docker-build-amd64:
    executor: docker
    working_directory: ~/docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run: make -C docker platform=amd64 test-platform-docker
    resource_class: large
  docker-push-amd64:
    executor: docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make -C docker platform=amd64 release-platform-docker
    resource_class: large
  docker-build-arm64:
    executor: docker
    working_directory: ~/docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run: make -C docker platform=arm64 test-platform-docker
    resource_class: arm.large
  docker-push-arm64:
    executor: docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make -C docker platform=arm64 release-platform-docker
    resource_class: arm.large
  docker-manifest:
    executor: docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make -C docker manifest-platform-docker
    resource_class: arm.large

  go-build-amd64:
    executor: docker
    working_directory: ~/docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run: make -C go platform=amd64 test-platform-docker
    resource_class: large
  go-push-amd64:
    executor: docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make -C go platform=amd64 release-platform-docker
    resource_class: large
  go-build-arm64:
    executor: docker
    working_directory: ~/docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run: make -C go platform=arm64 test-platform-docker
    resource_class: arm.large
  go-push-arm64:
    executor: docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make -C go platform=arm64 release-platform-docker
    resource_class: arm.large
  go-manifest:
    executor: docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make -C go manifest-platform-docker
    resource_class: arm.large

  k8s-build-amd64:
    executor: docker
    working_directory: ~/docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
          docker_layer_caching: true
      - run: make -C k8s platform=amd64 test-platform-docker
    resource_class: large
  k8s-push-amd64:
    executor: docker
    steps:
      - checkout-submodules
      - setup_remote_docker:
