version: 2.1

parameters:
  docker:
    type: boolean
    default: false
  go:
    type: boolean
    default: false
  k8s:
    type: boolean
    default: false
  release:
    type: boolean
    default: false
  root:
    type: boolean
    default: false
  ruby:
    type: boolean
    default: false

jobs:
  lint:
    docker:
      - image: alexfalkowski/docker:1.53
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - run: make lint
    resource_class: arm.large
  version:
    docker:
      - image: alexfalkowski/release:5.56
    working_directory: ~/docker
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - run: make pull
      - run: version
    resource_class: arm.large
  wait-all:
    docker:
      - image: alexfalkowski/docker:1.53
    steps:
      - run: echo "all applicable jobs finished"
    resource_class: arm.large

  docker-build-amd64:
    docker:
      - image: alexfalkowski/docker:1.53
    working_directory: ~/docker
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - setup_remote_docker:
          docker_layer_caching: true
      - run: make -C docker platform=amd64 build-platform-docker
    resource_class: large
  docker-push-amd64:
    docker:
      - image: alexfalkowski/docker:1.53
    steps:
      - checkout:
          method: blobless
      - run: git submodule sync
      - run: git submodule update --init
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: make login
          command: echo "$DOCKERHUB_PASS" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - run: make -C docker platform=amd64 push-platform-docker
    resource_class: large
  docker-build-arm64:
